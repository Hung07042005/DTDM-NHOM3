server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Serve static frontend files.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to backend.
    location /api/ {
        proxy_pass https://dtdm-nhom3-production.up.railway.app/api/;
        proxy_http_version 1.1;
        proxy_set_header Host dtdm-nhom3-production.up.railway.app;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy OAuth login and callback endpoints.
    location /login/ {
        proxy_pass https://dtdm-nhom3-production.up.railway.app/login/;
        proxy_http_version 1.1;
        proxy_set_header Host dtdm-nhom3-production.up.railway.app;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /auth/ {
        proxy_pass https://dtdm-nhom3-production.up.railway.app/auth/;
        proxy_http_version 1.1;
        proxy_set_header Host dtdm-nhom3-production.up.railway.app;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Optional backend docs.
    location /docs {
        proxy_pass https://dtdm-nhom3-production.up.railway.app/docs;
        proxy_http_version 1.1;
        proxy_set_header Host dtdm-nhom3-production.up.railway.app;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /openapi.json {
        proxy_pass https://dtdm-nhom3-production.up.railway.app/openapi.json;
        proxy_http_version 1.1;
        proxy_set_header Host dtdm-nhom3-production.up.railway.app;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
